name: finsentinel_pipeline
jobs:
  - task_key: streaming_ingest
    description: "Stream financial news from Pub/Sub to Delta Lake bronze"
    notebook_task:
      notebook_path: /Workspace/finsentinel/01_streaming_ingest
      base_parameters:
        pubsub_subscription: "projects/finsentinel-nlp/subscriptions/news-processor"
        gcs_bucket: "gs://finsentinel-databricks"
        bronze_table: "finsentinel.bronze.articles"
    cluster_key: finsentinel_cluster
    timeout_seconds: 0
    max_retries: 1

  - task_key: dlt_pipeline
    description: "Transform raw data through medallion architecture (bronze → silver → gold)"
    pipeline_task:
      pipeline_id: "finsentinel-dlt-prod"
    depends_on:
      - task_key: streaming_ingest
    max_retries: 2

  - task_key: retraining_check
    description: "Check for data drift and trigger retraining if needed"
    notebook_task:
      notebook_path: /Workspace/finsentinel/02_drift_monitoring
      base_parameters:
        drift_threshold: "0.30"
    cluster_key: finsentinel_cluster
    depends_on:
      - task_key: dlt_pipeline
    max_retries: 1

  - task_key: model_retraining
    description: "Fine-tune FinBERT on latest articles if drift detected"
    spark_python_task:
      python_file: "dbfs:/finsentinel/ml/train_finbert_job.py"
      parameters:
        - "--use-databricks"
        - "--catalog=finsentinel"
    cluster_key: finsentinel_training_cluster
    depends_on:
      - task_key: retraining_check
    max_retries: 1
    timeout_seconds: 3600

  - task_key: promote_model
    description: "Promote best model to Production in MLflow Registry"
    notebook_task:
      notebook_path: /Workspace/finsentinel/03_promote_model
    cluster_key: finsentinel_cluster
    depends_on:
      - task_key: model_retraining
    max_retries: 1

clusters:
  - cluster_key: finsentinel_cluster
    spark_version: "15.3.x-scala2.12"
    node_type_id: "i3.xlarge"
    num_workers: 2
    aws_attributes:
      availability: "SPOT_WITH_FALLBACK"
    autoscale:
      min_workers: 1
      max_workers: 4

  - cluster_key: finsentinel_training_cluster
    spark_version: "15.3.x-scala2.12"
    node_type_id: "g4dn.xlarge"
    num_workers: 2
    aws_attributes:
      availability: "SPOT_WITH_FALLBACK"
    autoscale:
      min_workers: 1
      max_workers: 4

schedule:
  quartz_cron_expression: "0 */5 * * * ?"
  timezone_id: "UTC"
  pause_status: "UNPAUSED"

max_concurrent_runs: 1
timeout_seconds: 7200
