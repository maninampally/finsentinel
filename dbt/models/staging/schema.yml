version: 2

sources:
  - name: finsentinel_silver
    tables:
      - name: articles

models:
  - name: stg_articles
    description: "Staging model for articles built from the Silver layer"
    columns:
      - name: article_id
        tests:
          - not_null
          - unique
      - name: title
        tests:
          - not_null
      - name: cleaned_text
        tests:
          - not_null
      - name: published_at
        tests:
          - not_null
