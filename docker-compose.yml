version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/creds.json
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    volumes:
      - ./creds.json:/app/creds.json
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/creds.json
    volumes:
      - ./creds.json:/app/creds.json
    depends_on:
      - api

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    volumes:
      - ./:/usr/src/app
    working_dir: /usr/src/app/dbt
    command: tail -f /dev/null
    environment:
      - DBT_PROFILES_DIR=/usr/src/app/dbt
